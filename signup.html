<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Graceon</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background: var(--cream);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .auth-wrap {
      max-width: 480px;
      margin: 0 auto;
    }

    .auth-logo-link {
      display: block;
      text-align: center;
      margin-bottom: 24px;
    }

    .auth-logo-link .navbar-logo {
      font-size: 28px;
    }

    .auth-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow);
    }

    .auth-title {
      font-family: var(--font-serif);
      font-size: 26px;
      color: var(--dark);
      text-align: center;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 28px;
    }

    .auth-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .auth-form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .auth-form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--dark);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .auth-form-group input,
    .auth-form-group select {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      transition: var(--transition);
      font-family: var(--font);
    }

    .auth-form-group input:focus,
    .auth-form-group select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(27,107,53,0.1);
    }

    .auth-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--green);
      margin: 20px 0 4px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .auth-submit-btn {
      width: 100%;
      background: var(--green);
      color: var(--white);
      padding: 14px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 8px;
    }

    .auth-submit-btn:hover { background: var(--green-dark); }
    .auth-submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .auth-error {
      background: #fee;
      color: #c0392b;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }

    .auth-error.show { display: block; }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--gray);
    }

    .auth-switch a {
      color: var(--green);
      font-weight: 600;
    }

    .auth-back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--gray);
    }

    .auth-back-link:hover { color: var(--green); }

    @media (max-width: 480px) {
      .auth-form-row { grid-template-columns: 1fr; }
      .auth-card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <a href="index.html" class="auth-logo-link">
      <span class="navbar-logo">Grace<span>O</span>n</span>
    </a>

    <div class="auth-card">
      <h1 class="auth-title">Create Your Account</h1>
      <p class="auth-subtitle">Join Graceon for faster checkout and order tracking</p>

      <div class="auth-error" id="signup-error"></div>

      <form id="signup-form">
        <div class="auth-form-row">
          <div class="auth-form-group">
            <label>First Name *</label>
            <input type="text" id="signup-firstname" placeholder="Chioma" required />
          </div>
          <div class="auth-form-group">
            <label>Last Name *</label>
            <input type="text" id="signup-lastname" placeholder="Adika" required />
          </div>
        </div>

        <div class="auth-form-group">
          <label>Email Address *</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required />
        </div>

        <div class="auth-form-group">
          <label>Password *</label>
          <input type="password" id="signup-password" placeholder="At least 6 characters" required minlength="6" />
        </div>

        <div class="auth-section-title">📍 Shipping Details</div>

        <div class="auth-form-group">
          <label>State *</label>
          <select id="signup-state" required>
            <option value="">Select your state</option>
            <option>Abia</option><option>Adamawa</option><option>Akwa Ibom</option>
            <option>Anambra</option><option>Bauchi</option><option>Bayelsa</option>
            <option>Benue</option><option>Borno</option><option>Cross River</option>
            <option>Delta</option><option>Ebonyi</option><option>Edo</option>
            <option>Ekiti</option><option>Enugu</option><option>FCT - Abuja</option>
            <option>Gombe</option><option>Imo</option><option>Jigawa</option>
            <option>Kaduna</option><option>Kano</option><option>Katsina</option>
            <option>Kebbi</option><option>Kogi</option><option>Kwara</option>
            <option>Lagos</option><option>Nasarawa</option><option>Niger</option>
            <option>Ogun</option><option>Ondo</option><option>Osun</option>
            <option>Oyo</option><option>Plateau</option><option>Rivers</option>
            <option>Sokoto</option><option>Taraba</option><option>Yobe</option>
            <option>Zamfara</option>
          </select>
        </div>

        <div class="auth-form-group">
          <label>Home Address *</label>
          <input type="text" id="signup-address" placeholder="House number, street, area" required />
        </div>

        <div class="auth-form-group">
          <label>Phone Number</label>
          <input type="tel" id="signup-phone" placeholder="+234 800 000 0000" />
        </div>

        <button type="submit" class="auth-submit-btn" id="signup-btn">
          Create Account
        </button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Log In</a></p>
    </div>

    <a href="index.html" class="auth-back-link">← Back to Graceon</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/customer-auth.js"></script>
</body>
</html>
