<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Graceon</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-wrap {
      max-width: 420px;
      width: 100%;
    }

    .auth-logo-link {
      display: block;
      text-align: center;
      margin-bottom: 24px;
    }

    .auth-logo-link .navbar-logo {
      font-size: 28px;
    }

    .auth-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow);
    }

    .auth-title {
      font-family: var(--font-serif);
      font-size: 26px;
      color: var(--dark);
      text-align: center;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 28px;
    }

    .auth-form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    .auth-form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--dark);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .auth-form-group input {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      transition: var(--transition);
    }

    .auth-form-group input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(27,107,53,0.1);
    }

    .auth-submit-btn {
      width: 100%;
      background: var(--green);
      color: var(--white);
      padding: 14px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 8px;
    }

    .auth-submit-btn:hover { background: var(--green-dark); }
    .auth-submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .auth-error {
      background: #fee;
      color: #c0392b;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }

    .auth-error.show { display: block; }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--gray);
    }

    .auth-switch a {
      color: var(--green);
      font-weight: 600;
    }

    .auth-back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--gray);
    }

    .auth-back-link:hover { color: var(--green); }

    .auth-guest-note {
      background: var(--green-light);
      color: var(--green-dark);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <a href="index.html" class="auth-logo-link">
      <span class="navbar-logo">Grace<span>O</span>n</span>
    </a>

    <div class="auth-card">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Log in to track orders and check out faster</p>

      <div class="auth-error" id="login-error"></div>

      <form id="login-form">
        <div class="auth-form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="auth-form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="auth-submit-btn" id="login-btn">
          Log In
        </button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>

      <div class="auth-guest-note">
        🛒 You can also <a href="shop.html" style="color:var(--green-dark); font-weight:700;">checkout as a guest</a> — no account needed!
      </div>
    </div>

    <a href="index.html" class="auth-back-link">← Back to Graceon</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/customer-auth.js"></script>
</body>
</html>
