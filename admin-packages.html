<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Packages — Graceon Admin</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar-logo">Grace<span>O</span>n <span class="admin-tag">Admin</span></div>

      <nav class="admin-nav">
        <a href="admin-dashboard.html" class="admin-nav-link">
          <span>📊</span> Dashboard
        </a>
        <a href="admin-products.html" class="admin-nav-link">
          <span>🍪</span> Products
        </a>
        <a href="admin-packages.html" class="admin-nav-link active">
          <span>🎁</span> Packages
        </a>
        <a href="admin-orders.html" class="admin-nav-link">
          <span>📦</span> Orders
        </a>
      </nav>

      <div class="admin-sidebar-footer">
        <a href="index.html" class="admin-nav-link">
          <span>🌐</span> View Site
        </a>
        <button class="admin-logout-btn" onclick="adminLogout()">
          <span>🚪</span> Log Out
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="admin-main">
      <header class="admin-header">
        <h1>Manage Packages</h1>
        <p>Add, edit, or remove curated gift packages</p>
      </header>

      <!-- TOOLBAR -->
      <div class="admin-toolbar">
        <div class="admin-search-box">
          <span class="admin-search-icon">🔍</span>
          <input type="text" id="package-search" placeholder="Search packages..." />
        </div>
        <button class="btn-admin-add" onclick="openPackageModal()">
          ➕ Add New Package
        </button>
      </div>

      <!-- PACKAGES TABLE -->
      <div class="admin-panel">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Type</th>
                <th>Price</th>
                <th>Badge</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="packages-table-body">
              <tr><td colspan="7" style="text-align:center; color:var(--gray)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- ADD/EDIT PACKAGE MODAL -->
  <div class="admin-modal-overlay" id="package-modal-overlay">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h3 id="package-modal-title">Add New Package</h3>
        <button class="admin-modal-close" onclick="closePackageModal()">✕</button>
      </div>
      <div class="admin-modal-body">
        <input type="hidden" id="package-id" />

        <div class="admin-form-group full">
          <label>Package Name *</label>
          <input type="text" id="package-name" placeholder="e.g. Birthday Bliss Box" />
        </div>

        <div class="admin-form-group full">
          <label>Description</label>
          <textarea id="package-description" rows="3" placeholder="Describe this package..."></textarea>
        </div>

        <div class="admin-form-row">
          <div class="admin-form-group">
            <label>Price ($) *</label>
            <input type="number" id="package-price" step="0.01" placeholder="65.00" />
          </div>
          <div class="admin-form-group">
            <label>Package Type</label>
            <select id="package-type">
              <option value="Birthday Celebration">Birthday Celebration</option>
              <option value="Corporate Gifting">Corporate Gifting</option>
              <option value="Seasonal Specials">Seasonal Specials</option>
              <option value="Wedding Favors">Wedding Favors</option>
            </select>
          </div>
        </div>

        <div class="admin-form-group full">
          <label>Contents (one per line)</label>
          <textarea id="package-contents" rows="4" placeholder="1 Dozen Sea Salt Dark Chocolate&#10;1 Dozen Velvet Dream Luxe&#10;Birthday ribbon & card"></textarea>
        </div>

        <div class="admin-form-row">
          <div class="admin-form-group">
            <label>Badge</label>
            <select id="package-badge">
              <option value="">None</option>
              <option value="Best Seller">Best Seller</option>
              <option value="Limited Edition">Limited Edition</option>
              <option value="New">New</option>
            </select>
          </div>
          <div class="admin-form-group">
            <label>In Stock</label>
            <select id="package-in-stock">
              <option value="true">Yes</option>
              <option value="false">No</option>
            </select>
          </div>
        </div>

        <div class="admin-form-group full">
          <label>Image URL</label>
          <input type="text" id="package-image" placeholder="assets/images/package.jpg or https://..." />
        </div>

        <div class="admin-form-group full">
          <label>Featured on Homepage</label>
          <select id="package-featured">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>

      </div>
      <div class="admin-modal-footer">
        <button class="btn-modal-cancel" onclick="closePackageModal()">Cancel</button>
        <button class="btn-modal-save" id="package-save-btn" onclick="savePackage()">Save Package</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/admin-packages.js"></script>
</body>
</html>
