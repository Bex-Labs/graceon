<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Orders — Graceon Admin</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar-logo">Grace<span>O</span>n <span class="admin-tag">Admin</span></div>

      <nav class="admin-nav">
        <a href="admin-dashboard.html" class="admin-nav-link">
          <span>📊</span> Dashboard
        </a>
        <a href="admin-products.html" class="admin-nav-link">
          <span>🍪</span> Products
        </a>
        <a href="admin-packages.html" class="admin-nav-link">
          <span>🎁</span> Packages
        </a>
        <a href="admin-orders.html" class="admin-nav-link active">
          <span>📦</span> Orders
        </a>
      </nav>

      <div class="admin-sidebar-footer">
        <a href="index.html" class="admin-nav-link">
          <span>🌐</span> View Site
        </a>
        <button class="admin-logout-btn" onclick="adminLogout()">
          <span>🚪</span> Log Out
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="admin-main">
      <header class="admin-header">
        <h1>Manage Orders</h1>
        <p>View and update customer orders</p>
      </header>

      <!-- TOOLBAR -->
      <div class="admin-toolbar">
        <div class="admin-search-box">
          <span class="admin-search-icon">🔍</span>
          <input type="text" id="order-search" placeholder="Search by customer name or email..." />
        </div>
        <select class="sort-select" id="order-status-filter" style="max-width:180px">
          <option value="all">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <!-- ORDERS TABLE -->
      <div class="admin-panel">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Customer</th>
                <th>Email</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="orders-table-body">
              <tr><td colspan="7" style="text-align:center; color:var(--gray)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- ORDER DETAIL MODAL -->
  <div class="admin-modal-overlay" id="order-modal-overlay">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h3>Order Details</h3>
        <button class="admin-modal-close" onclick="closeOrderModal()">✕</button>
      </div>
      <div class="admin-modal-body" id="order-modal-body">
        <!-- Filled by JS -->
      </div>
      <div class="admin-modal-footer">
        <button class="btn-modal-cancel" onclick="closeOrderModal()">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/admin-orders.js"></script>
</body>
</html>
